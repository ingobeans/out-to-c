<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Out To C</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png">
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
  }
}
</script>
</head>

<body>
  <a href="https://hackclub.com" id="hackclub-flag"><img src="https://assets.hackclub.com/flag-orpheus-top.svg"></a>
  <div id="background"></div>
  <div style="position: absolute;width:100%"><img id="logo" src="logo.svg" alt="Out To C"></div>
  <img id="scroll-indicator" src="scroll.svg">
  <div class="ocean-gradient"></div>
  <div class="spacer"></div>
  <!-- text contents! -->
  <div class="container">
    <div class="centered">
      <main>
        <h1>Out To C</h1>
        <p>Voyage out to sea on the hunt for treasure! You write projects in C or C++, and while you work,
          your
          ship travels
          further and further. On the way, there's islands with treasure chests!</p>
      </main>
      <div class="card-holder">
        <img src="card1.svg">
        <img src="card2.svg">
        <img src="card3.svg">
      </div>
      <div class="map-holder">
        <div style="background-color: red;width: var(--w_factor);height: var(--w_factor);"></div>
        <div class="map-marker" id="map-marker-1">
          <div>
            <div>(Choose 1)</div>
          </div>

        </div>
        <div class="map-marker" id="map-marker-2">
          <div>
            <div>(Choose 1)</div>
          </div>
        </div>
        <div class="map-marker" id="map-marker-3">
          <div>
            <div>(Choose 1)</div>
          </div>
        </div>
        <img src="map.svg" id="map">
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
